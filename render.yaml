services:
  - type: web
    name: crondash
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/prod.db
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: alerts@crondash.com
    disk:
      name: crondash-data
      mountPath: /opt/render/project/src/prisma
      sizeGB: 1
