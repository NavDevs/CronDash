services:
  crondash:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - SESSION_SECRET=${SESSION_SECRET:-change-this-to-a-random-secret}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-alerts@crondash.com}
    volumes:
      - crondash-data:/app/prisma

volumes:
  crondash-data:
